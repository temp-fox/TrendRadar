name: Cleanup old runs and issues

on:
  schedule:
    - cron: "17 2 * * 0"
  workflow_dispatch:

permissions:
  actions: write
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "Cleaning workflow runs older than 7 days..."
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          PAGE=1
          DELETED=0
          while true; do
            RUNS=$(gh api "repos/${REPO}/actions/runs?per_page=100&page=${PAGE}&created=<${CUTOFF}" --jq '.workflow_runs[].id' 2>/dev/null)
            if [ -z "$RUNS" ]; then
              break
            fi
            for RUN_ID in $RUNS; do
              gh api -X DELETE "repos/${REPO}/actions/runs/${RUN_ID}" 2>/dev/null && DELETED=$((DELETED+1))
            done
            PAGE=$((PAGE+1))
            if [ $PAGE -gt 10 ]; then break; fi
          done
          echo "Deleted ${DELETED} workflow runs"

      - name: Close and delete old issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "Cleaning issues older than 7 days..."
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          DELETED=0
          ISSUES=$(gh issue list --repo "${REPO}" --state all --limit 200 --json number,createdAt --jq ".[] | select(.createdAt < \"${CUTOFF}\") | .number")
          for ISSUE_NUM in $ISSUES; do
            gh issue close "$ISSUE_NUM" --repo "${REPO}" 2>/dev/null
            gh api -X DELETE "repos/${REPO}/issues/${ISSUE_NUM}" 2>/dev/null
            DELETED=$((DELETED+1))
          done
          echo "Processed ${DELETED} issues"
